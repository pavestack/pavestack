replicaCount: 2

# team feeds the pavestack.io/team label the require-pavestack-labels
# Kyverno ClusterPolicy enforces on every workload. pave create-service
# overrides this per tenant in platform-config/tenants/<name>/{dev,prod}/values.yaml.
team: platform

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/pavestack/service-template-api
  tag: "0.1.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 5

env:
  LOG_LEVEL: info
  LISTEN_ADDR: ":8080"
  SERVICE_NAME: service-template-api

# OpenTelemetry tracing. When enabled, OTEL_EXPORTER_OTLP_ENDPOINT is injected
# into the container and traces are exported to Tempo (OTLP/HTTP). The service
# name reported in traces comes from the SERVICE_NAME env var above.
otel:
  enabled: true
  exporterEndpoint: http://tempo.observability.svc.cluster.local:4318

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Optional secrets integration via the External Secrets Operator (see
# platform-infra/modules/secrets and platform-config/templates/external-secret).
# When enabled, a per-release ExternalSecret pulls key/value pairs from a
# Secrets Manager secret (following the pavestack/<tenant>/<name> convention)
# into a Kubernetes Secret named <fullname>, which the aws-secrets-manager
# ClusterSecretStore must already exist to satisfy.
secrets:
  externalSecret:
    enabled: false
    # Secrets Manager key to sync, e.g. pavestack/acme/service-template-api.
    key: ""
  # When true (and secrets.externalSecret.enabled is true), the container
  # loads every key in the rendered Secret via envFrom.secretRef.
  envFrom: true

networkPolicy:
  enabled: true

# Opt-in ingress. Disabled by default; the service is reachable in-cluster via
# the Service. When enabled with className "alb", the AWS Load Balancer Controller
# provisions an ALB. Recommended annotations (set under ingress.annotations):
#   alb.ingress.kubernetes.io/scheme: internet-facing
#   alb.ingress.kubernetes.io/target-type: ip
#   alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
#   cert-manager.io/cluster-issuer: letsencrypt
#   external-dns.alpha.kubernetes.io/hostname: <host>
ingress:
  enabled: false
  className: alb
  host: ""
  annotations: {}
  # tls is a list of networking.k8s.io/v1 IngressTLS entries, e.g.:
  #   - hosts: ["api.example.com"]
  #     secretName: service-template-api-tls
  tls: []

# Progressive delivery via Argo Rollouts (installed cluster-wide by
# platform-config/clusters/*/platform-addons.yaml). Set analysisEnabled:
# false to run a plain canary with only timed pauses (no automated
# metric-based rollback) - e.g. for a brand-new service with no traffic
# history yet to alarm on.
rollout:
  analysisEnabled: true
  prometheusAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
  steps:
    - setWeight: 20
    - pauseSeconds: 60
    - setWeight: 50
    - pauseSeconds: 60
    - setWeight: 100
