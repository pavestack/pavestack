# Argo Rollouts canary in place of a plain apps/v1 Deployment - this is the
# golden path's progressive-delivery mechanism (see AGENTS.md and
# .agents/memory/decisions.md "progressive delivery"). Requires the
# argo-rollouts controller, installed cluster-wide by
# platform-config/clusters/*/platform-addons.yaml. No service mesh/ingress
# controller is assumed, so this uses Argo Rollouts' basic canary (traffic
# is weighted by the ratio of canary-to-stable replica counts behind the
# existing ClusterIP Service in service.yaml, not header/weight-based
# routing) - accurate enough for internal API services at Pavestack's
# current scale, and upgradable to trafficRouting (e.g. an Argo Rollouts
# Istio/ALB integration) later without changing this file's shape.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "service-template-api.fullname" . }}
  labels:
    {{- include "service-template-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    canary:
      {{- if .Values.rollout.analysisEnabled }}
      analysis:
        templates:
          - templateName: {{ include "service-template-api.fullname" . }}-success-rate
        args:
          - name: service-name
            value: {{ include "service-template-api.fullname" . }}
        startingStep: 1
      {{- end }}
      steps:
        {{- range .Values.rollout.steps }}
        {{- if hasKey . "setWeight" }}
        - setWeight: {{ .setWeight }}
        {{- else if hasKey . "pauseSeconds" }}
        - pause: { duration: {{ .pauseSeconds }}s }
        {{- end }}
        {{- end }}
  template:
    metadata:
      labels:
        {{- include "service-template-api.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ default (include "service-template-api.fullname" .) .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
