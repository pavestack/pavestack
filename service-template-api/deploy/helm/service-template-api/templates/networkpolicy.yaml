{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "service-template-api.fullname" . }}-allow-ingress
  labels:
    {{- include "service-template-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    {{- if .Values.ingress.enabled }}
    # Allow ALB traffic: with alb.ingress.kubernetes.io/target-type: ip the ALB
    # reaches pod IPs directly from outside the cluster, so it is not matched by
    # the in-cluster namespaceSelector rule above. An ingress rule with only
    # ports (no from) permits all sources on the target port.
    - ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    {{- end }}
{{- end }}
