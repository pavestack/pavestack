apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pavestack-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/pavestack/pavestack.git
    targetRevision: main
    path: platform-config/clusters/dev
    directory:
      recurse: true
      include: "{project-pavestack.yaml,applicationset-*.yaml,application-*.yaml,platform-addons.yaml}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
