# Argo CD's syncPolicy.automated.selfHeal (set on every Application/
# ApplicationSet in this repo) means live-state drift from Git is
# corrected automatically - but "corrected silently" and "alerted on" are
# different things, and the platform-engineering bar is the latter: a
# developer who ran `kubectl edit` against a tenant namespace (bypassing
# the GitOps constraint) should page someone, not just get quietly
# reverted with no record. This patches the built-in
# argocd-notifications-cm/-secret with a global subscription so every
# Application - including ones generated by the tenant ApplicationSets,
# which we don't want to hand-annotate per tenant - reports OutOfSync,
# Degraded, and sync-failure events without any per-Application wiring.
#
# The webhook URL itself is a real secret and is deliberately NOT in this
# file - set it via `argocd-notifications-secret`'s
# webhook-platform-alerts-url key through your normal secrets pipeline
# (e.g. External Secrets Operator, SOPS) before this ConfigMap does
# anything useful; until then these triggers are configured but have
# nowhere to deliver, which is a safe default (fails visible in Argo CD's
# own UI/API either way, never fails silently).
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    pavestack.io/team: platform
data:
  service.webhook.platform-alerts: |
    url: $webhook-platform-alerts-url
    headers:
      - name: Content-Type
        value: application/json

  trigger.on-drift-detected: |
    - when: app.status.sync.status == 'OutOfSync' and app.status.operationState.phase in ['Succeeded']
      send: [drift-detected]
  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [health-degraded]
  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [sync-failed]

  template.drift-detected: |
    webhook:
      platform-alerts:
        method: POST
        body: |
          {"text": "[pavestack] {{.app.metadata.name}} has drifted from Git (OutOfSync) - selfHeal will correct it, but someone bypassed the GitOps PR flow. Investigate: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}"}
  template.health-degraded: |
    webhook:
      platform-alerts:
        method: POST
        body: |
          {"text": "[pavestack] {{.app.metadata.name}} is Degraded. {{.context.argocdUrl}}/applications/{{.app.metadata.name}}"}
  template.sync-failed: |
    webhook:
      platform-alerts:
        method: POST
        body: |
          {"text": "[pavestack] {{.app.metadata.name}} sync FAILED. {{.context.argocdUrl}}/applications/{{.app.metadata.name}}"}

  # Global subscription: applies to every Application in the pavestack
  # AppProject without requiring per-Application
  # notifications.argoproj.io/subscribe.* annotations (which the tenant
  # ApplicationSets don't set, and shouldn't have to per-tenant).
  subscriptions: |
    - recipients:
        - webhook:platform-alerts
      triggers:
        - on-drift-detected
        - on-health-degraded
        - on-sync-failed
