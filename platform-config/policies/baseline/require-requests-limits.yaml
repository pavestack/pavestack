apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-requests-limits
  annotations:
    policies.kyverno.io/title: Require Resource Requests and Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Every container must declare CPU and memory requests and limits so that the
      scheduler can make sane placement decisions and a single noisy tenant cannot
      starve the node. validationFailureAction is set per-environment by the
      overlays in platform-config/policies/overlays.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
      # Platform/system namespaces run components we do not own the manifests
      # for (Argo CD, Kyverno itself, observability stack, cert-manager,
      # external-secrets, external-dns) — only tenant workloads are validated.
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - argocd
                - observability
                - cert-manager
                - external-secrets
                - external-dns
      validate:
        message: "CPU and memory resource requests and limits are required for every container."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
                    cpu: "?*"
