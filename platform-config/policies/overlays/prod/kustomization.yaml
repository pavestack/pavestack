apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../baseline
# Prod runs every baseline policy in Enforce mode: non-conformant Pods are
# rejected at admission. Only flip a policy here once it has run clean
# (zero violations) in the dev overlay for one full week.
patches:
  - target:
      kind: ClusterPolicy
      name: require-requests-limits
    patch: |
      - op: replace
        path: /spec/validationFailureAction
        value: Enforce
  - target:
      kind: ClusterPolicy
      name: disallow-privileged
    patch: |
      - op: replace
        path: /spec/validationFailureAction
        value: Enforce
  - target:
      kind: ClusterPolicy
      name: disallow-latest-tag
    patch: |
      - op: replace
        path: /spec/validationFailureAction
        value: Enforce
  - target:
      kind: ClusterPolicy
      name: restrict-registries
    patch: |
      - op: replace
        path: /spec/validationFailureAction
        value: Enforce
  - target:
      kind: ClusterPolicy
      name: require-run-as-nonroot
    patch: |
      - op: replace
        path: /spec/validationFailureAction
        value: Enforce
