# Requires the External Secrets Operator (see platform-infra/modules/secrets)
# to already be installed, including its IRSA-backed controller service
# account (system:serviceaccount:external-secrets:external-secrets).
#
# NOTE: `region` must be replaced with the cluster's AWS region before this
# is applied.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: REPLACE_REGION
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
