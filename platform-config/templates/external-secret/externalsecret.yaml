# Example ExternalSecret for a tenant application. Requires the
# aws-secrets-manager ClusterSecretStore (see
# platform-config/templates/cluster-secret-store) to already be applied.
#
# Secrets Manager path convention: pavestack/<tenant>/<name> — e.g.
# pavestack/acme/app holds every secret value for the "acme" tenant's "app"
# workload as key/value pairs on a single Secrets Manager secret.
# dataFrom.extract projects all of those keys onto the target Kubernetes
# Secret, so application code can consume them via envFrom without listing
# each key individually.
#
# NOTE: `REPLACE_NAMESPACE`, `REPLACE_NAME`, and `REPLACE_TENANT` must be
# replaced before this is applied (the service-template-api chart's
# templates/externalsecret.yaml renders the equivalent resource directly,
# see secrets.externalSecret in its values.yaml).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: REPLACE_NAME
  namespace: REPLACE_NAMESPACE
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: REPLACE_NAME
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: pavestack/REPLACE_TENANT/app
