repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: make-fmt
        name: Make Fmt
        entry: make fmt
        language: system
        pass_filenames: false
      - id: make-lint
        name: Make Lint
        entry: make lint
        language: system
        pass_filenames: false
      - id: make-test
        name: Make Test
        entry: make test
        language: system
        pass_filenames: false
