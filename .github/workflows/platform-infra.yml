name: platform-infra

on:
  pull_request:
    paths:
      - "platform-infra/**"
      - ".github/workflows/platform-infra.yml"
  push:
    branches: ["main"]
    paths:
      - "platform-infra/**"
      - ".github/workflows/platform-infra.yml"
  # checkov:skip=CKV_GHA_7: Allow manual env selection
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to apply
        required: true
        type: choice
        options: ["dev", "prod"]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  fmt-validate-scan:
    name: fmt validate scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ["dev", "prod"]
    defaults:
      run:
        working-directory: platform-infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform fmt
        run: terraform fmt -recursive -check

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint init
        run: tflint --init

      - name: TFLint scan
        run: tflint --recursive


      - name: Terraform init without backend
        run: terraform -chdir=envs/${{ matrix.environment }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=envs/${{ matrix.environment }} validate

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: platform-infra
          framework: terraform
          quiet: true
          soft_fail: true

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: platform-infra
          severity: CRITICAL,HIGH
          exit-code: 0

  plan:
    name: plan
    needs: fmt-validate-scan
    if: github.event_name == 'pull_request' && vars.AWS_ROLE_ARN != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ["dev", "prod"]
    environment: ${{ matrix.environment }}
    defaults:
      run:
        working-directory: platform-infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Write backend config
        working-directory: platform-infra/envs/${{ matrix.environment }}
        env:
          TF_BACKEND_KMS_KEY_ID: ${{ vars.TF_BACKEND_KMS_KEY_ID }}
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${{ vars.TF_BACKEND_BUCKET }}"
          key          = "platform-infra/${{ matrix.environment }}/terraform.tfstate"
          region       = "${{ vars.AWS_REGION }}"
          use_lockfile = true
          encrypt      = true
          EOF
          if [ -n "${TF_BACKEND_KMS_KEY_ID:-}" ]; then
            echo "kms_key_id = \"${TF_BACKEND_KMS_KEY_ID}\"" >> backend.hcl
          fi

      - name: Terraform init
        run: terraform -chdir=envs/${{ matrix.environment }} init -backend-config=backend.hcl

      - name: Terraform plan
        run: terraform -chdir=envs/${{ matrix.environment }} plan -no-color -out=tfplan

  apply:
    name: apply
    needs: fmt-validate-scan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.AWS_ROLE_ARN != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ["dev", "prod"]
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || matrix.environment }}
    steps:
      - name: Skip non-selected environment
        if: github.event_name == 'workflow_dispatch' && matrix.environment != inputs.environment
        run: echo "Skipping ${{ matrix.environment }}"

      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment

      - uses: hashicorp/setup-terraform@v3
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        with:
          terraform_version: 1.9.0

      - uses: aws-actions/configure-aws-credentials@v4
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Write backend config
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        working-directory: platform-infra/envs/${{ matrix.environment }}
        env:
          TF_BACKEND_KMS_KEY_ID: ${{ vars.TF_BACKEND_KMS_KEY_ID }}
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${{ vars.TF_BACKEND_BUCKET }}"
          key          = "platform-infra/${{ matrix.environment }}/terraform.tfstate"
          region       = "${{ vars.AWS_REGION }}"
          use_lockfile = true
          encrypt      = true
          EOF
          if [ -n "${TF_BACKEND_KMS_KEY_ID:-}" ]; then
            echo "kms_key_id = \"${TF_BACKEND_KMS_KEY_ID}\"" >> backend.hcl
          fi

      - name: Terraform init
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        run: terraform -chdir=platform-infra/envs/${{ matrix.environment }} init -backend-config=backend.hcl

      - name: Terraform plan
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        run: terraform -chdir=platform-infra/envs/${{ matrix.environment }} plan -out=tfplan

      - name: Terraform apply
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        run: terraform -chdir=platform-infra/envs/${{ matrix.environment }} apply -auto-approve tfplan
