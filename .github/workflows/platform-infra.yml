name: platform-infra

on:
  pull_request:
    paths:
      - "platform-infra/**"
      - ".github/workflows/platform-infra.yml"
  push:
    branches: ["main"]
    paths:
      - "platform-infra/**"
      - ".github/workflows/platform-infra.yml"
  # checkov:skip=CKV_GHA_7: Allow manual env selection
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to apply
        required: true
        type: choice
        options: ["dev", "staging", "prod"]
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  id-token: write
  pull-requests: write
  issues: write

jobs:
  fmt-validate-scan:
    name: fmt validate scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ["dev", "staging", "prod"]
    defaults:
      run:
        working-directory: platform-infra
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install terraform-docs
        working-directory: .
        run: |
          curl -sSLo /tmp/terraform-docs.tar.gz https://github.com/terraform-docs/terraform-docs/releases/download/v0.18.0/terraform-docs-v0.18.0-linux-amd64.tar.gz
          tar -xzf /tmp/terraform-docs.tar.gz -C /tmp terraform-docs
          sudo mv /tmp/terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version

      - name: Terraform docs check
        working-directory: .
        # Non-blocking until the READMEs have been regenerated once with the real
        # binary (they were hand-authored in terraform-docs format); flip to
        # blocking by removing continue-on-error after that first regeneration.
        continue-on-error: true
        run: terraform-docs --config .terraform-docs.yml --output-check ./platform-infra/modules

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.9.0

      - name: Terraform fmt
        run: terraform fmt -recursive -check

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6

      - name: TFLint init
        # Authenticated so the ruleset download isn't throttled by the
        # anonymous GitHub API rate limit shared across runner IPs.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --init

      - name: TFLint scan
        run: tflint --recursive


      - name: Terraform init without backend
        run: terraform -chdir=envs/${{ matrix.environment }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=envs/${{ matrix.environment }} validate

      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@d9d1e5cdc53e3a91f0c4c58db7bc19ee31cac7e5 # v12
        with:
          directory: platform-infra
          quiet: true
          config_file: .checkov.yaml

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master
        with:
          scan-type: config
          scan-ref: platform-infra
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore

  infracost:
    name: infracost
    needs: fmt-validate-scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        environment: ["dev", "staging", "prod"]
    defaults:
      run:
        working-directory: platform-infra
    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check enablement
        id: check
        run: echo "enabled=${{ env.INFRACOST_API_KEY != '' }}" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        if: env.INFRACOST_API_KEY != ''
        with:
          terraform_version: 1.9.0

      - name: Setup Infracost
        if: env.INFRACOST_API_KEY != ''
        uses: infracost/actions/setup@v3 # TODO: pin to commit SHA
        with:
          api-key: ${{ env.INFRACOST_API_KEY }}

      - name: Fetch base ref
        if: env.INFRACOST_API_KEY != ''
        run: git fetch origin ${{ github.base_ref }}

      - name: Checkout base ref into worktree
        if: env.INFRACOST_API_KEY != ''
        run: git worktree add /tmp/infracost-base origin/${{ github.base_ref }}

      - name: Generate Infracost baseline (base ref)
        if: env.INFRACOST_API_KEY != ''
        run: |
          # The base branch may not have this environment yet (e.g. a PR that
          # introduces it); skip the baseline and fall back to a plain breakdown.
          if [ -d "/tmp/infracost-base/platform-infra/envs/${{ matrix.environment }}" ]; then
            infracost breakdown \
              --path=/tmp/infracost-base/platform-infra/envs/${{ matrix.environment }} \
              --format=json \
              --out-file=/tmp/base.json
          else
            echo "Base ref has no envs/${{ matrix.environment }}; skipping baseline."
          fi

      - name: Generate Infracost diff (head)
        if: env.INFRACOST_API_KEY != ''
        run: |
          if [ -f /tmp/base.json ]; then
            infracost diff \
              --path=envs/${{ matrix.environment }} \
              --compare-to=/tmp/base.json \
              --format=json \
              --out-file=/tmp/infracost.json
          else
            infracost breakdown \
              --path=envs/${{ matrix.environment }} \
              --format=json \
              --out-file=/tmp/infracost.json
          fi

      - name: Post Infracost comment
        if: env.INFRACOST_API_KEY != ''
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          infracost comment github \
            --path=/tmp/infracost.json \
            --repo=$GITHUB_REPOSITORY \
            --pull-request=${{ github.event.pull_request.number }} \
            --github-token=${{ github.token }} \
            --behavior=update

  plan:
    name: plan
    needs: fmt-validate-scan
    if: github.event_name == 'pull_request' && vars.AWS_ROLE_ARN != '' && vars.ENABLE_AWS_DEPLOY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        environment: ["dev", "staging", "prod"]
    environment: ${{ matrix.environment }}
    defaults:
      run:
        working-directory: platform-infra
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.9.0

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Write backend config
        working-directory: platform-infra/envs/${{ matrix.environment }}
        env:
          TF_BACKEND_KMS_KEY_ID: ${{ vars.TF_BACKEND_KMS_KEY_ID }}
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${{ vars.TF_BACKEND_BUCKET }}"
          key          = "platform-infra/${{ matrix.environment }}/terraform.tfstate"
          region       = "${{ vars.AWS_REGION }}"
          use_lockfile = true
          encrypt      = true
          EOF
          if [ -n "${TF_BACKEND_KMS_KEY_ID:-}" ]; then
            echo "kms_key_id = \"${TF_BACKEND_KMS_KEY_ID}\"" >> backend.hcl
          fi

      - name: Terraform init
        run: terraform -chdir=envs/${{ matrix.environment }} init -backend-config=backend.hcl

      - name: Terraform plan
        run: terraform -chdir=envs/${{ matrix.environment }} plan -no-color -out=tfplan

      - name: Render plan text
        run: |
          terraform -chdir=envs/${{ matrix.environment }} show -no-color tfplan > /tmp/plan.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7 # TODO: pin to commit SHA
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- terraform-plan-${{ matrix.environment }} -->';
            let plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const limit = 60000;
            if (plan.length > limit) {
              plan = plan.slice(0, limit) + '\n... (truncated)';
            }
            const body = `${marker}\n### Terraform plan: \`${{ matrix.environment }}\`\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${plan}\n\`\`\`\n</details>`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  apply:
    name: apply
    needs: fmt-validate-scan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.AWS_ROLE_ARN != '' && vars.ENABLE_AWS_DEPLOY == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ["dev", "staging", "prod"]
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || matrix.environment }}
    steps:
      - name: Skip non-selected environment
        if: github.event_name == 'workflow_dispatch' && matrix.environment != inputs.environment
        run: echo "Skipping ${{ matrix.environment }}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        with:
          terraform_version: 1.9.0

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Write backend config
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        working-directory: platform-infra/envs/${{ matrix.environment }}
        env:
          TF_BACKEND_KMS_KEY_ID: ${{ vars.TF_BACKEND_KMS_KEY_ID }}
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${{ vars.TF_BACKEND_BUCKET }}"
          key          = "platform-infra/${{ matrix.environment }}/terraform.tfstate"
          region       = "${{ vars.AWS_REGION }}"
          use_lockfile = true
          encrypt      = true
          EOF
          if [ -n "${TF_BACKEND_KMS_KEY_ID:-}" ]; then
            echo "kms_key_id = \"${TF_BACKEND_KMS_KEY_ID}\"" >> backend.hcl
          fi

      - name: Terraform init
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        run: terraform -chdir=platform-infra/envs/${{ matrix.environment }} init -backend-config=backend.hcl

      - name: Terraform plan
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        run: terraform -chdir=platform-infra/envs/${{ matrix.environment }} plan -out=tfplan

      - name: Terraform apply
        if: github.event_name != 'workflow_dispatch' || matrix.environment == inputs.environment
        run: terraform -chdir=platform-infra/envs/${{ matrix.environment }} apply -auto-approve tfplan

  drift:
    name: drift
    needs: fmt-validate-scan
    if: github.event_name == 'schedule' && vars.ENABLE_AWS_DEPLOY == 'true' && vars.AWS_ROLE_ARN != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        environment: ["dev", "staging", "prod"]
    environment: ${{ matrix.environment }}
    defaults:
      run:
        working-directory: platform-infra
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.9.0

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Write backend config
        working-directory: platform-infra/envs/${{ matrix.environment }}
        env:
          TF_BACKEND_KMS_KEY_ID: ${{ vars.TF_BACKEND_KMS_KEY_ID }}
        run: |
          cat > backend.hcl <<EOF
          bucket       = "${{ vars.TF_BACKEND_BUCKET }}"
          key          = "platform-infra/${{ matrix.environment }}/terraform.tfstate"
          region       = "${{ vars.AWS_REGION }}"
          use_lockfile = true
          encrypt      = true
          EOF
          if [ -n "${TF_BACKEND_KMS_KEY_ID:-}" ]; then
            echo "kms_key_id = \"${TF_BACKEND_KMS_KEY_ID}\"" >> backend.hcl
          fi

      - name: Terraform init
        run: terraform -chdir=envs/${{ matrix.environment }} init -backend-config=backend.hcl

      - name: Terraform plan
        id: plan
        working-directory: platform-infra
        run: |
          set +e
          terraform -chdir=envs/${{ matrix.environment }} plan -no-color -detailed-exitcode -out=tfplan
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "Terraform plan failed for ${{ matrix.environment }}"
          exit 1

      - name: Report drift
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7 # TODO: pin to commit SHA
        with:
          script: |
            const title = 'Terraform drift detected: ${{ matrix.environment }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Drift persists. See run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Terraform plan detected drift in \`${{ matrix.environment }}\`. See run: ${runUrl}`,
                labels: ['drift'],
              });
            }
