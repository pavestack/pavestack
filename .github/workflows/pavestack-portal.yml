name: pavestack-portal

on:
  pull_request:
    paths:
      - "pavestack-portal/**"
      - ".github/workflows/pavestack-portal.yml"
  push:
    branches: ["main"]
    paths:
      - "pavestack-portal/**"
      - ".github/workflows/pavestack-portal.yml"

permissions:
  contents: read

jobs:
  build-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pavestack-portal
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pavestack-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate catalog
        run: npm run generate-catalog

      - name: Build static export
        run: npm run build


      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@476e4fdcdc675b65ce75e8c3440b48d7a494f0e5 # master
        with:
          scan-type: fs
          scan-ref: pavestack-portal
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff # v12
        with:
          directory: pavestack-portal
          quiet: true
          soft_fail: true
