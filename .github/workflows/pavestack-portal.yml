name: pavestack-portal

on:
  pull_request:
    paths:
      - "pavestack-portal/**"
      - ".github/workflows/pavestack-portal.yml"
  push:
    branches: ["main"]
    paths:
      - "pavestack-portal/**"
      - ".github/workflows/pavestack-portal.yml"

permissions:
  contents: read

jobs:
  build-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pavestack-portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pavestack-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate catalog
        run: npm run generate-catalog

      - name: Build static export
        run: npm run build

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: pavestack-portal
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: pavestack-portal
          quiet: true
          soft_fail: true
