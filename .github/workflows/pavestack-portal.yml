name: pavestack-portal

on:
  pull_request:
    paths:
      - "pavestack-portal/**"
      - ".github/workflows/pavestack-portal.yml"
  push:
    branches: ["main"]
    paths:
      - "pavestack-portal/**"
      - ".github/workflows/pavestack-portal.yml"

permissions:
  contents: read

jobs:
  build-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pavestack-portal
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pavestack-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Generate catalog
        run: npm run generate-catalog

      - name: Build static export
        run: npm run build


      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          scan-ref: pavestack-portal
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          directory: pavestack-portal
          quiet: true
          config_file: .checkov.yaml
