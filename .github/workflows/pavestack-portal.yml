name: pavestack-portal

on:
  pull_request:
    paths:
      - "pavestack-portal/**"
      - ".github/workflows/pavestack-portal.yml"
  push:
    branches: ["main"]
    paths:
      - "pavestack-portal/**"
      - ".github/workflows/pavestack-portal.yml"

permissions:
  contents: read

jobs:
  build-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pavestack-portal
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pavestack-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Generate catalog
        run: npm run generate-catalog

      - name: Build static export
        run: npm run build


      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master
        with:
          scan-type: fs
          scan-ref: pavestack-portal
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@d9d1e5cdc53e3a91f0c4c58db7bc19ee31cac7e5 # v12
        with:
          directory: pavestack-portal
          quiet: true
          config_file: .checkov.yaml
