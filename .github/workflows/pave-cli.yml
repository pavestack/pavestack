name: pave-cli

on:
  pull_request:
    paths:
      - "pave/**"
      - ".github/workflows/pave-cli.yml"
  push:
    branches: ["main"]
    paths:
      - "pave/**"
      - ".github/workflows/pave-cli.yml"

permissions:
  contents: read

jobs:
  test-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pave
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: pave/go.sum

      - name: Download modules
        run: go mod download

      - name: Unit tests
        run: go test ./...


      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: pave
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: pave
          quiet: true
          soft_fail: true
