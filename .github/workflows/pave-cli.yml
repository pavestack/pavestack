name: pave-cli

on:
  pull_request:
    paths:
      - "pave/**"
      - ".github/workflows/pave-cli.yml"
  push:
    branches: ["main"]
    paths:
      - "pave/**"
      - ".github/workflows/pave-cli.yml"

permissions:
  contents: read

jobs:
  test-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pave
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: pave/go.sum

      - name: Download modules
        run: go mod download

      - name: Unit tests
        run: go test ./...


      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master
        with:
          scan-type: fs
          scan-ref: pave
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@a7683e7b72a04503521247973281ec8142e1ac1f # v12
        with:
          directory: pave
          quiet: true
          config_file: .checkov.yaml
