name: pave-cli

on:
  pull_request:
    paths:
      - "pave/**"
      - ".github/workflows/pave-cli.yml"
  push:
    branches: ["main"]
    paths:
      - "pave/**"
      - ".github/workflows/pave-cli.yml"

permissions:
  contents: read

jobs:
  test-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pave
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.4"
          cache-dependency-path: pave/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: test -z "$(gofmt -l .)" || (gofmt -d . && exit 1)

      - name: Unit tests with coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | tr -d '%')
          # Floor, not a target - a few points below the ~68% baseline at the
          # time this was added, so it fails on a real regression, not noise.
          awk -v cov="$COVERAGE" 'BEGIN { exit !(cov >= 60) }' \
            || (echo "Coverage ${COVERAGE}% is below the 60% floor" && exit 1)


      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          scan-ref: pave
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          directory: pave
          quiet: true
          config_file: .checkov.yaml

      # pave-api isn't deployed anywhere yet (no platform-config/tenants/pave-api),
      # so there's no registry to push to or GitOps promotion to open - this
      # just proves the Dockerfile builds and the resulting image is clean.
      # See pave/Dockerfile's own comment for why it ships without git/gh.
      - name: Build pave-api image
        run: docker build -t pave-api:ci -f Dockerfile .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          image-ref: pave-api:ci
          severity: CRITICAL,HIGH
          exit-code: 1
