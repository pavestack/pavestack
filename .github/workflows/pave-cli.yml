name: pave-cli

on:
  pull_request:
    paths:
      - "pave/**"
      - ".github/workflows/pave-cli.yml"
  push:
    branches: ["main"]
    paths:
      - "pave/**"
      - ".github/workflows/pave-cli.yml"

permissions:
  contents: read

jobs:
  test-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pave
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: pave/go.sum

      - name: Download modules
        run: go mod download

      - name: Unit tests
        run: go test ./...


      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@476e4fdcdc675b65ce75e8c3440b48d7a494f0e5 # master
        with:
          scan-type: fs
          scan-ref: pave
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff # v12
        with:
          directory: pave
          quiet: true
          soft_fail: true
