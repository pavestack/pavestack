name: platform-config

on:
  pull_request:
    paths:
      - "platform-config/**"
      - ".github/workflows/platform-config.yml"
  push:
    branches: ["main"]
    paths:
      - "platform-config/**"
      - ".github/workflows/platform-config.yml"

permissions:
  contents: read

jobs:
  validate-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7


      - name: Validate Kubernetes manifests
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          find platform-config -name '*.yaml' -print0 | while IFS= read -r -d '' file; do
            kubectl apply --dry-run=client -f "$file" || true
          done

      - name: Checkov Kubernetes scan
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          directory: platform-config
          framework: kubernetes
          quiet: true
          config_file: .checkov.yaml

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: config
          scan-ref: platform-config
          severity: CRITICAL,HIGH
          exit-code: 1
