name: platform-config

on:
  pull_request:
    paths:
      - "platform-config/**"
      - ".github/workflows/platform-config.yml"
  push:
    branches: ["main"]
    paths:
      - "platform-config/**"
      - ".github/workflows/platform-config.yml"

permissions:
  contents: read

jobs:
  validate-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7


      - name: Validate Kubernetes manifests
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          find platform-config -name '*.yaml' -print0 | while IFS= read -r -d '' file; do
            kubectl apply --dry-run=client -f "$file" || true
          done

      - name: Checkov Kubernetes scan
        uses: bridgecrewio/checkov-action@d9d1e5cdc53e3a91f0c4c58db7bc19ee31cac7e5 # v12
        with:
          directory: platform-config
          framework: kubernetes
          quiet: true
          config_file: .checkov.yaml

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master
        with:
          scan-type: config
          scan-ref: platform-config
          severity: CRITICAL,HIGH
          exit-code: 1
