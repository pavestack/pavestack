name: service-template-api

on:
  pull_request:
    paths:
      - "service-template-api/**"
      - ".github/workflows/service-template-api.yml"
  push:
    branches: ["main"]
    paths:
      - "service-template-api/**"
      - ".github/workflows/service-template-api.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  SERVICE_NAME: service-template-api
  SERVICE_DIR: service-template-api
  ECR_REPOSITORY: pavestack/service-template-api
  PLATFORM_CONFIG_PATH: platform-config/tenants/service-template-api

jobs:
  test-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service-template-api
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: service-template-api/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: test -z "$(gofmt -l .)" || (gofmt -d . && exit 1)

      - name: Unit tests with coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | tr -d '%')
          # Floor, not a target - a few points below the ~82% baseline at the
          # time this was added, so it fails on a real regression, not noise.
          awk -v cov="$COVERAGE" 'BEGIN { exit !(cov >= 75) }' \
            || (echo "Coverage ${COVERAGE}% is below the 75% floor" && exit 1)

      - name: Verify OpenAPI spec is present
        run: test -f openapi.yaml

      - name: Spec lint (Spectral)
        run: npx --yes @stoplight/spectral-cli lint openapi.yaml --ruleset .spectral.yaml

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master
        with:
          scan-type: fs
          scan-ref: service-template-api
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Checkov Docker and Kubernetes scan
        uses: bridgecrewio/checkov-action@a7683e7b72a04503521247973281ec8142e1ac1f # v12
        with:
          directory: service-template-api
          quiet: true
          config_file: .checkov.yaml

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0 # TODO: pin to commit SHA
        with:
          path: service-template-api
          format: spdx-json
          artifact-name: sbom-source.spdx.json

  build-push-pr:
    needs: test-scan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.AWS_ROLE_ARN != '' && vars.ENABLE_AWS_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: service-template-api/go.sum

      - name: Compute image tag
        id: meta
        run: |
          TAG="$(git rev-parse --short HEAD)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Build and push image
        env:
          REGISTRY: ${{ vars.ECR_REGISTRY }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          IMAGE="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"
          docker build -t "${IMAGE}" service-template-api
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master
        with:
          image-ref: ${{ env.IMAGE }}
          severity: CRITICAL,HIGH
          exit-code: 1

      # anchore/sbom-action and sigstore/cosign-installer are pinned by
      # version tag rather than SHA, pending dependabot's first
      # github-actions bump for these newly-added actions - see the
      # "action pinning" note in AGENTS.md.
      - name: Generate image SBOM
        uses: anchore/sbom-action@v0.20.9
        with:
          image: ${{ env.IMAGE }}
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom-image.spdx.json
          upload-artifact: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      # Keyless signing: cosign uses the job's GitHub OIDC token (id-token:
      # write, already granted above) to get a short-lived Fulcio cert and
      # records the signature in the public Rekor transparency log - no
      # signing key is generated or stored anywhere.
      - name: Sign image and attest SBOM (keyless, GitHub OIDC)
        env:
          IMAGE: ${{ env.IMAGE }}
        run: |
          cosign sign --yes "${IMAGE}"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE}"

      - name: Update platform-config image tag
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          pip install --quiet pyyaml
          python3 <<'PY'
          import os, pathlib, yaml
          tag = os.environ["TAG"]
          # dev and staging promote automatically; staging -> prod is a separate
          # manually-approved PR (see docs/promotion.md).
          for env in ("dev", "staging"):
              path = pathlib.Path(f"platform-config/tenants/service-template-api/{env}/values.yaml")
              if not path.exists():
                  continue
              data = yaml.safe_load(path.read_text()) or {}
              data.setdefault("image", {})["tag"] = tag
              path.write_text(yaml.safe_dump(data, sort_keys=False))
          PY

      - name: Create GitOps PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          BRANCH="chore/bump-${SERVICE_NAME}-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add platform-config/tenants/service-template-api
          if git diff --cached --quiet; then
            echo "No platform-config changes required."
            exit 0
          fi
          git commit -m "chore(service-template-api): promote image ${TAG}"
          git push -u origin "${BRANCH}"
          gh pr create \
            --title "chore(service-template-api): promote image ${TAG}" \
            --body "Automated GitOps promotion for \`${SERVICE_NAME}\` image tag \`${TAG}\` to dev and staging. Argo CD reconciles after merge; staging -> prod is a separate approved PR (docs/promotion.md)."

  build-push-acr:
    needs: test-scan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.AZURE_CLIENT_ID != ''
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: service-template-api/go.sum

      - name: Compute image tag
        id: meta
        run: |
          TAG="$(git rev-parse --short HEAD)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${{ vars.ACR_REGISTRY }}"

      - name: Build and push image
        env:
          REGISTRY: ${{ vars.ACR_REGISTRY }}.azurecr.io
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          IMAGE="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"
          docker build -t "${IMAGE}" service-template-api
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master
        with:
          image-ref: ${{ env.IMAGE }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Update platform-config image tag
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          pip install --quiet pyyaml
          python3 <<'PY'
          import os, pathlib, yaml
          tag = os.environ["TAG"]
          # dev and staging promote automatically; staging -> prod is a separate
          # manually-approved PR (see docs/promotion.md).
          for env in ("dev", "staging"):
              path = pathlib.Path(f"platform-config/tenants/service-template-api/{env}/values.yaml")
              if not path.exists():
                  continue
              data = yaml.safe_load(path.read_text()) or {}
              data.setdefault("image", {})["tag"] = tag
              path.write_text(yaml.safe_dump(data, sort_keys=False))
          PY

      - name: Create GitOps PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          BRANCH="chore/bump-${SERVICE_NAME}-acr-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add platform-config/tenants/service-template-api
          if git diff --cached --quiet; then
            echo "No platform-config changes required."
            exit 0
          fi
          git commit -m "chore(service-template-api): promote image ${TAG}"
          git push -u origin "${BRANCH}"
          gh pr create \
            --title "chore(service-template-api): promote image ${TAG}" \
            --body "Automated GitOps promotion for \`${SERVICE_NAME}\` image tag \`${TAG}\` to dev and staging. Argo CD reconciles after merge; staging -> prod is a separate approved PR (docs/promotion.md)."
