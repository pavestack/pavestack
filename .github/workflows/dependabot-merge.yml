name: dependabot-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependabot-merge:
    runs-on: ubuntu-latest
    # Only run for dependabot PRs
    if: github.actor == 'dependabot[bot]' || github.actor == 'dependabot'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Approve and auto-merge dependabot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Check if the PR is from dependabot
          if [ "${{ github.actor }}" = "dependabot[bot]" ] || [ "${{ github.actor }}" = "dependabot" ]; then
            # Enable auto-merge with squash strategy
            gh pr merge "$PR_NUMBER" --squash --auto || true
          fi
