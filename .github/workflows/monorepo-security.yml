name: monorepo-security

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:


  trivy-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
          exit-code: 1

  checkov-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@a7683e7b72a04503521247973281ec8142e1ac1f # v12
        with:
          directory: .
          quiet: true
          config_file: .checkov.yaml

  tflint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-infra
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6
      - name: TFLint init
        run: tflint --init
      - name: TFLint scan
        run: tflint --recursive

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      # gitleaks-action requires a paid license for organizations; the
      # open-source CLI runs the identical scan without one, so install the
      # pinned binary and invoke it directly.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks

      - name: Gitleaks secret scan
        run: /tmp/gitleaks git --config .gitleaks.toml --redact --exit-code 1 --verbose .
