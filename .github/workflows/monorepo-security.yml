name: monorepo-security

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:


  trivy-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc # master
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
          exit-code: 1

  checkov-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@a7683e7b72a04503521247973281ec8142e1ac1f # v12
        with:
          directory: .
          quiet: true
          config_file: .checkov.yaml

  tflint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-infra
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6
      - name: TFLint init
        run: tflint --init
      - name: TFLint scan
        run: tflint --recursive

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        # Pinned by version tag, not SHA, pending dependabot's first
        # github-actions bump for this newly-added action (see AGENTS.md
        # "action pinning" note) - every other action in this repo is
        # SHA-pinned and this one will be too after that first bump.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
