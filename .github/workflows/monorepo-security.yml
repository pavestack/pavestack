name: monorepo-security

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:


  trivy-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # master
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore
          exit-code: 1

  checkov-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Checkov policy scan
        uses: bridgecrewio/checkov-action@fa9edf8f0a491c59a924ea6accd5bdcf07752cff # v12
        with:
          directory: .
          quiet: true
          config_file: .checkov.yaml

  tflint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-infra
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6
      - name: TFLint init
        run: tflint --init
      - name: TFLint scan
        run: tflint --recursive

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        # Pinned by version tag, not SHA, pending dependabot's first
        # github-actions bump for this newly-added action (see AGENTS.md
        # "action pinning" note) - every other action in this repo is
        # SHA-pinned and this one will be too after that first bump.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
